<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello TypeGPU</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        user-select: text;
      }

      #canvas {
        width: 50vw;
        aspect-ratio: 1 / 1;
        display: block;
      }

      #content {
        width: 100%;
        height: 100%;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: text;
      }

      h1 {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 10rem;
      }

      svg {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas">
      <div id="content">
        <h1>Hello, world!</h1>
      </div>
    </canvas>
    <script type="module" src="/index.ts"></script>
  </body>
</html>
